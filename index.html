<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPERATION: LAST STAND - Tactical Web Engine</title>
    <style>
        /* =========================================================
           TACTICAL UI STYLESHEET
           ========================================================= */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --hud-green: #00ff66;
            --hud-red: #ff3333;
            --hud-bg: rgba(10, 15, 10, 0.85);
            --hud-border: rgba(0, 255, 102, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #050505;
            color: var(--hud-green);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        /* The Game World */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: repeating-linear-gradient(
                45deg,
                #0a0a0a,
                #0a0a0a 10px,
                #0f0f0f 10px,
                #0f0f0f 20px
            );
        }

        /* Screen Glitch Overlay */
        #scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 5;
            pointer-events: none;
            opacity: 0.3;
        }

        /* Damage Vignette */
        #damage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 0px var(--hud-red);
            z-index: 4;
            pointer-events: none;
            transition: box-shadow 0.1s ease-out;
        }

        /* =========================================================
           HUD ELEMENTS (HEADS UP DISPLAY)
           ========================================================= */
        #hud-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-panel {
            background: var(--hud-bg);
            border: 1px solid var(--hud-border);
            padding: 15px;
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }

        /* Top Bar: Match Info */
        #top-hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        #minimap-container {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid var(--hud-green);
            overflow: hidden;
            position: relative;
            background: rgba(0,20,0,0.5);
            box-shadow: 0 0 15px rgba(0,255,100,0.2);
        }

        #wave-info {
            text-align: center;
        }
        #wave-info h1 { font-size: 24px; letter-spacing: 2px; }
        #wave-info h2 { font-size: 16px; color: #888; }

        #score-board {
            text-align: right;
        }
        .score-val { font-size: 28px; font-weight: bold; }

        /* Bottom Bar: Player Stats */
        #bottom-hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        #health-armor {
            width: 300px;
        }
        .bar-container {
            width: 100%;
            height: 15px;
            background: #222;
            margin-top: 5px;
            border: 1px solid #444;
            position: relative;
        }
        #hp-bar {
            height: 100%;
            width: 100%;
            background: var(--hud-green);
            transition: width 0.1s linear, background 0.3s;
        }
        
        #weapon-info {
            text-align: right;
            min-width: 250px;
        }
        #current-weapon { font-size: 24px; font-weight: bold; color: #fff; }
        #ammo-count { font-size: 36px; color: var(--hud-green); }
        #ammo-reserve { font-size: 18px; color: #888; }

        /* Center Screen Elements */
        #center-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
        }

        /* Hitmarker Cross */
        .hitmarker {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
        }
        .hitmarker::before, .hitmarker::after {
            content: '';
            position: absolute;
            background: white;
        }
        .hitmarker::before { top: 0; left: 9px; width: 2px; height: 20px; transform: rotate(45deg); }
        .hitmarker::after { top: 9px; left: 0; width: 20px; height: 2px; transform: rotate(45deg); }

        .hit-active { animation: hitFlash 0.2s ease-out; }
        .kill-active { animation: hitFlash 0.3s ease-out; background: red !important; }

        @keyframes hitFlash {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* Menus */
        #main-menu, #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .menu-title { font-size: 64px; color: #fff; text-shadow: 0 0 20px var(--hud-green); margin-bottom: 20px; }
        .btn {
            background: transparent;
            border: 2px solid var(--hud-green);
            color: var(--hud-green);
            padding: 15px 40px;
            font-size: 24px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn:hover {
            background: var(--hud-green);
            color: #000;
            box-shadow: 0 0 20px var(--hud-green);
        }

        .hidden { display: none !important; }

    </style>
</head>
<body>

    <div id="scanlines"></div>
    <div id="damage-overlay"></div>

    <canvas id="game-canvas"></canvas>

    <div id="hud-container" class="hidden">
        <div id="top-hud">
            <div id="minimap-container" class="hud-panel">
                <canvas id="minimap-canvas" width="150" height="150"></canvas>
            </div>
            
            <div id="wave-info" class="hud-panel">
                <h1 id="wave-display">WAVE 1</h1>
                <h2 id="enemies-remaining">TARGETS: 0</h2>
            </div>
            
            <div id="score-board" class="hud-panel">
                <div>SCORE</div>
                <div id="score-display" class="score-val">000000</div>
                <div style="margin-top: 10px; color:#888;">MULTIPLIER</div>
                <div id="multiplier-display" style="color:#fff;">x1.0</div>
            </div>
        </div>

        <div id="center-screen">
            <div id="hitmarker" class="hitmarker"></div>
        </div>

        <div id="bottom-hud">
            <div id="health-armor" class="hud-panel">
                <div>OPERATOR INTEGRITY</div>
                <div class="bar-container">
                    <div id="hp-bar"></div>
                </div>
                <div style="margin-top: 10px; font-size: 12px; color: #888;">PRESS [1] [2] [3] TO SWITCH WEAPONS</div>
            </div>

            <div id="weapon-info" class="hud-panel">
                <div id="current-weapon">M4A1 ASSAULT</div>
                <div>
                    <span id="ammo-count">30</span> 
                    <span id="ammo-reserve">/ 120</span>
                </div>
                <div id="reload-warning" style="color:var(--hud-red); font-size:12px; margin-top:5px; opacity:0;">RELOADING...</div>
            </div>
        </div>
    </div>

    <div id="main-menu">
        <div class="menu-title">OPERATION: LAST STAND</div>
        <p style="color:#888; margin-bottom: 40px; text-align: center;">
            WASD to Move | MOUSE to Aim & Shoot | R to Reload<br>
            Survive the infinite waves.
        </p>
        <button class="btn" id="start-btn">DEPLOY TO AO</button>
    </div>

    <div id="game-over" class="hidden">
        <div class="menu-title" style="color:var(--hud-red); text-shadow: 0 0 20px var(--hud-red);">KIA</div>
        <div style="font-size: 24px; margin-bottom: 10px;">FINAL SCORE: <span id="final-score">0</span></div>
        <div style="font-size: 18px; color:#888; margin-bottom: 40px;">WAVES CLEARED: <span id="final-wave">0</span></div>
        <button class="btn" id="restart-btn">REDEPLOY</button>
    </div>

    <script>
        /**
         * ENGINE CORE INITIALIZATION
         */
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimap-canvas');
        const mctx = minimapCanvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });

        // DOM Elements
        const DOM = {
            mainMenu: document.getElementById('main-menu'),
            gameOver: document.getElementById('game-over'),
            hud: document.getElementById('hud-container'),
            startBtn: document.getElementById('start-btn'),
            restartBtn: document.getElementById('restart-btn'),
            hpBar: document.getElementById('hp-bar'),
            ammoCount: document.getElementById('ammo-count'),
            ammoReserve: document.getElementById('ammo-reserve'),
            currentWeapon: document.getElementById('current-weapon'),
            scoreDisplay: document.getElementById('score-display'),
            waveDisplay: document.getElementById('wave-display'),
            enemiesRemaining: document.getElementById('enemies-remaining'),
            hitmarker: document.getElementById('hitmarker'),
            damageOverlay: document.getElementById('damage-overlay'),
            reloadWarning: document.getElementById('reload-warning'),
            finalScore: document.getElementById('final-score'),
            finalWave: document.getElementById('final-wave')
        };

        /**
         * GAME STATE & CONFIGURATION
         */
        const GameState = {
            isRunning: false,
            score: 0,
            wave: 1,
            frame: 0,
            camera: { x: 0, y: 0 },
            mouse: { x: width/2, y: height/2, isDown: false }
        };

        const keys = { w: false, a: false, s: false, d: false, r: false };

        // Input Listeners
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true;
            if (e.key === '1') player.equipWeapon(0);
            if (e.key === '2') player.equipWeapon(1);
            if (e.key === '3') player.equipWeapon(2);
        });
        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false;
        });
        window.addEventListener('mousemove', (e) => {
            GameState.mouse.x = e.clientX;
            GameState.mouse.y = e.clientY;
        });
        window.addEventListener('mousedown', () => GameState.mouse.isDown = true);
        window.addEventListener('mouseup', () => GameState.mouse.isDown = false);

        /**
         * MATH & UTILITY FUNCTIONS
         */
        const MathUtils = {
            distance: (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1),
            angle: (x1, y1, x2, y2) => Math.atan2(y2 - y1, x2 - x1),
            random: (min, max) => Math.random() * (max - min) + min
        };

        /**
         * ARMORY (WEAPON DEFINITIONS)
         */
        const Armory = [
            {
                name: "M4A1 (ASSAULT)",
                color: "#ccc",
                damage: 25,
                fireRate: 8, // Frames between shots
                bulletSpeed: 20,
                spread: 0.05,
                magSize: 30,
                reloadTime: 90, // Frames
                auto: true
            },
            {
                name: "LOCKWOOD 680 (SHOTGUN)",
                color: "#a55",
                damage: 15, // Per pellet
                fireRate: 45,
                bulletSpeed: 15,
                spread: 0.25,
                pellets: 8,
                magSize: 8,
                reloadTime: 120,
                auto: false
            },
            {
                name: "KATT-AMR (SNIPER)",
                color: "#5a5",
                damage: 150,
                fireRate: 70,
                bulletSpeed: 35,
                spread: 0.01,
                magSize: 5,
                reloadTime: 150,
                auto: false,
                pierce: true // Goes through enemies
            }
        ];

        /**
         * ENTITY CLASSES
         */

        // 1. Particle System (Blood, Sparks, Casings)
        class Particle {
            constructor(x, y, color, speed, size, life, angle) {
                this.x = x; this.y = y;
                this.color = color;
                this.size = size;
                this.life = life;
                this.maxLife = life;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.friction = 0.95;
            }
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
            }
            draw(ctx, camX, camY) {
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x - camX, this.y - camY, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // 2. Projectile System
        class Bullet {
            constructor(x, y, angle, weaponStats) {
                this.x = x; this.y = y;
                // Add spread
                const finalAngle = angle + (Math.random() - 0.5) * weaponStats.spread;
                this.vx = Math.cos(finalAngle) * weaponStats.bulletSpeed;
                this.vy = Math.sin(finalAngle) * weaponStats.bulletSpeed;
                this.damage = weaponStats.damage;
                this.pierce = weaponStats.pierce || false;
                this.life = 100; // Frames before despawn
                this.hitEntities = new Set(); // For piercing
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                
                // Trail effect
                particles.push(new Particle(this.x, this.y, '#ffea00', 0, 1.5, 10, 0));
            }
            draw(ctx, camX, camY) {
                ctx.fillStyle = '#ffea00';
                ctx.beginPath();
                ctx.arc(this.x - camX, this.y - camY, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 3. Enemy AI
        class Zombie {
            constructor(x, y, health, speed, radius) {
                this.x = x; this.y = y;
                this.health = health;
                this.maxHealth = health;
                this.speed = speed;
                this.radius = radius;
                this.color = '#800000';
            }
            update(targetX, targetY) {
                const angle = MathUtils.angle(this.x, this.y, targetX, targetY);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;

                // Collision with other zombies to prevent stacking
                for (let other of enemies) {
                    if (other === this) continue;
                    const dist = MathUtils.distance(this.x, this.y, other.x, other.y);
                    if (dist < this.radius * 2) {
                        const pushAngle = MathUtils.angle(other.x, other.y, this.x, this.y);
                        this.x += Math.cos(pushAngle) * 0.5;
                        this.y += Math.sin(pushAngle) * 0.5;
                    }
                }
            }
            draw(ctx, camX, camY) {
                const drawX = this.x - camX;
                const drawY = this.y - camY;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.arc(drawX + 3, drawY + 3, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Body
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(drawX, drawY, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Outline
                ctx.strokeStyle = '#400000';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Health bar if damaged
                if (this.health < this.maxHealth) {
                    ctx.fillStyle = 'red';
                    ctx.fillRect(drawX - 10, drawY - this.radius - 8, 20, 3);
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(drawX - 10, drawY - this.radius - 8, 20 * (this.health / this.maxHealth), 3);
                }
            }
        }

        // 4. The Player
        class Player {
            constructor() {
                this.x = 0;
                this.y = 0;
                this.radius = 15;
                this.speed = 4;
                this.maxHealth = 100;
                this.health = this.maxHealth;
                this.weapons = JSON.parse(JSON.stringify(Armory)); // Deep copy to manage ammo
                this.weapons.forEach(w => w.ammo = w.magSize);
                this.currentWeaponIndex = 0;
                this.cooldown = 0;
                this.isReloading = false;
                this.reloadTimer = 0;
                this.triggerReleased = true; // For semi-auto
            }

            get weapon() { return this.weapons[this.currentWeaponIndex]; }

            equipWeapon(index) {
                if (this.isReloading || index >= this.weapons.length || index === this.currentWeaponIndex) return;
                this.currentWeaponIndex = index;
                this.cooldown = 10; // Swap delay
                this.updateHUD();
            }

            takeDamage(amount) {
                this.health -= amount;
                DOM.damageOverlay.style.boxShadow = `inset 0 0 ${amount * 10}px var(--hud-red)`;
                setTimeout(() => DOM.damageOverlay.style.boxShadow = 'inset 0 0 0px var(--hud-red)', 150);
                this.updateHUD();
                
                if (this.health <= 0) endGame();
            }

            update() {
                // Movement
                let dx = 0; let dy = 0;
                if (keys.w) dy -= 1;
                if (keys.s) dy += 1;
                if (keys.a) dx -= 1;
                if (keys.d) dx += 1;

                // Normalize diagonal movement
                if (dx !== 0 && dy !== 0) {
                    const length = Math.sqrt(dx*dx + dy*dy);
                    dx /= length; dy /= length;
                }

                this.x += dx * this.speed;
                this.y += dy * this.speed;

                // Camera follow logic
                GameState.camera.x = this.x - width / 2;
                GameState.camera.y = this.y - height / 2;

                // Gun Mechanics
                if (this.cooldown > 0) this.cooldown--;

                if (keys.r && !this.isReloading && this.weapon.ammo < this.weapon.magSize) {
                    this.isReloading = true;
                    this.reloadTimer = this.weapon.reloadTime;
                    DOM.reloadWarning.style.opacity = 1;
                }

                if (this.isReloading) {
                    this.reloadTimer--;
                    if (this.reloadTimer <= 0) {
                        this.isReloading = false;
                        this.weapon.ammo = this.weapon.magSize;
                        DOM.reloadWarning.style.opacity = 0;
                        this.updateHUD();
                    }
                } else {
                    // Shooting Logic
                    if (GameState.mouse.isDown) {
                        if (this.weapon.auto || this.triggerReleased) {
                            if (this.cooldown === 0 && this.weapon.ammo > 0) {
                                this.shoot();
                                this.weapon.ammo--;
                                this.cooldown = this.weapon.fireRate;
                                if (!this.weapon.auto) this.triggerReleased = false;
                                this.updateHUD();
                            } else if (this.weapon.ammo <= 0 && !this.isReloading) {
                                // Auto reload on empty
                                this.isReloading = true;
                                this.reloadTimer = this.weapon.reloadTime;
                                DOM.reloadWarning.style.opacity = 1;
                            }
                        }
                    } else {
                        this.triggerReleased = true;
                    }
                }

                // Health Regen (Out of combat)
                if (GameState.frame % 60 === 0 && this.health < this.maxHealth) {
                    this.health = Math.min(this.maxHealth, this.health + 2);
                    this.updateHUD();
                }
            }

            shoot() {
                const angle = MathUtils.angle(width/2, height/2, GameState.mouse.x, GameState.mouse.y);
                
                // Screen shake effect
                ctx.translate((Math.random()-0.5)*5, (Math.random()-0.5)*5);

                // Shotgun logic
                if (this.weapon.pellets) {
                    for(let i=0; i < this.weapon.pellets; i++) {
                        bullets.push(new Bullet(this.x, this.y, angle, this.weapon));
                    }
                } else {
                    bullets.push(new Bullet(this.x, this.y, angle, this.weapon));
                }

                // Muzzle flash particle
                particles.push(new Particle(
                    this.x + Math.cos(angle)*20, 
                    this.y + Math.sin(angle)*20, 
                    '#ffffaa', 2, 5, 5, angle + (Math.random()-0.5)
                ));
            }

            draw(ctx, camX, camY) {
                const drawX = this.x - camX;
                const drawY = this.y - camY;
                const angle = MathUtils.angle(width/2, height/2, GameState.mouse.x, GameState.mouse.y);

                ctx.save();
                ctx.translate(drawX, drawY);
                ctx.rotate(angle);

                // Draw Gun
                ctx.fillStyle = this.weapon.color;
                ctx.fillRect(10, -3, 20, 6);

                // Draw Player Body
                ctx.fillStyle = '#4a5';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#253';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
            }

            updateHUD() {
                DOM.hpBar.style.width = `${(this.health / this.maxHealth) * 100}%`;
                if(this.health < 30) DOM.hpBar.style.background = 'var(--hud-red)';
                else DOM.hpBar.style.background = 'var(--hud-green)';

                DOM.currentWeapon.textContent = this.weapon.name;
                DOM.ammoCount.textContent = this.weapon.ammo;
                DOM.ammoReserve.textContent = `/ INF`;
            }
        }

        /**
         * GLOBAL ARRAYS
         */
        let player;
        let bullets = [];
        let enemies = [];
        let particles = [];

        /**
         * CORE LOGIC & SYSTEMS
         */
        function spawnWave() {
            GameState.wave++;
            DOM.waveDisplay.textContent = `WAVE ${GameState.wave}`;
            
            const numEnemies = 5 + (GameState.wave * 3);
            for (let i = 0; i < numEnemies; i++) {
                // Spawn in a circle outside screen view
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.max(width, height) + 200 + Math.random() * 500;
                const ex = player.x + Math.cos(angle) * distance;
                const ey = player.y + Math.sin(angle) * distance;
                
                // Scaling difficulty
                const hp = 50 + (GameState.wave * 15);
                const speed = MathUtils.random(1.5, 3.0) + (GameState.wave * 0.1);
                const radius = MathUtils.random(12, 18);
                
                enemies.push(new Zombie(ex, ey, hp, Math.min(speed, 5.5), radius));
            }
            DOM.enemiesRemaining.textContent = `TARGETS: ${enemies.length}`;
        }

        function triggerHitmarker(isKill) {
            DOM.hitmarker.classList.remove('hit-active', 'kill-active');
            void DOM.hitmarker.offsetWidth; // Trigger reflow to restart animation
            DOM.hitmarker.classList.add(isKill ? 'kill-active' : 'hit-active');
        }

        function spawnBlood(x, y, angle) {
            for(let i=0; i<8; i++) {
                particles.push(new Particle(
                    x, y, 
                    Math.random() > 0.5 ? '#800' : '#c00', 
                    MathUtils.random(2, 6), 
                    MathUtils.random(2, 5), 
                    MathUtils.random(15, 30), 
                    angle + (Math.random()-0.5) * 1.5
                ));
            }
        }

        function updateScore(points) {
            GameState.score += points;
            DOM.scoreDisplay.textContent = GameState.score.toString().padStart(6, '0');
        }

        function drawGrid(camX, camY) {
            ctx.strokeStyle = 'rgba(0, 255, 100, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 100;
            const startX = -camX % gridSize;
            const startY = -camY % gridSize;

            ctx.beginPath();
            for (let x = startX; x < width; x += gridSize) {
                ctx.moveTo(x, 0); ctx.lineTo(x, height);
            }
            for (let y = startY; y < height; y += gridSize) {
                ctx.moveTo(0, y); ctx.lineTo(width, y);
            }
            ctx.stroke();
        }

        function drawMinimap() {
            mctx.clearRect(0, 0, 150, 150);
            
            // Draw radar circle
            mctx.strokeStyle = 'rgba(0, 255, 100, 0.3)';
            mctx.beginPath();
            mctx.arc(75, 75, 74, 0, Math.PI*2);
            mctx.stroke();

            // Draw scanning line
            const scanAngle = (GameState.frame % 120) / 120 * Math.PI * 2;
            mctx.beginPath();
            mctx.moveTo(75, 75);
            mctx.lineTo(75 + Math.cos(scanAngle)*75, 75 + Math.sin(scanAngle)*75);
            mctx.strokeStyle = 'rgba(0, 255, 100, 0.8)';
            mctx.stroke();

            const scale = 0.03; // minimap scale factor
            
            // Draw Enemies (Red dots)
            mctx.fillStyle = '#f33';
            enemies.forEach(e => {
                const relX = (e.x - player.x) * scale;
                const relY = (e.y - player.y) * scale;
                if(Math.hypot(relX, relY) < 70) {
                    mctx.beginPath();
                    mctx.arc(75 + relX, 75 + relY, 2, 0, Math.PI*2);
                    mctx.fill();
                }
            });

            // Draw Player (Green dot center)
            mctx.fillStyle = '#0f6';
            mctx.beginPath();
            mctx.arc(75, 75, 3, 0, Math.PI*2);
            mctx.fill();
        }

        /**
         * THE MASTER GAME LOOP
         */
        function gameLoop() {
            if (!GameState.isRunning) return;
            GameState.frame++;

            // 1. Clear Screen
            ctx.clearRect(0, 0, width, height);
            drawGrid(GameState.camera.x, GameState.camera.y);

            // 2. Update & Draw Player
            player.update();
            player.draw(ctx, GameState.camera.x, GameState.camera.y);

            // 3. Update & Draw Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.update();
                b.draw(ctx, GameState.camera.x, GameState.camera.y);
                if (b.life <= 0) bullets.splice(i, 1);
            }

            // 4. Update & Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw(ctx, GameState.camera.x, GameState.camera.y);
                if (p.life <= 0) particles.splice(i, 1);
            }

            // 5. Update & Draw Enemies + Collision Logic
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.update(player.x, player.y);
                e.draw(ctx, GameState.camera.x, GameState.camera.y);

                // Check collision with player
                if (MathUtils.distance(player.x, player.y, e.x, e.y) < player.radius + e.radius) {
                    player.takeDamage(1); // Damage per frame while touching
                }

                // Check collision with bullets
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    if (b.hitEntities.has(e)) continue; // Already hit this guy (piercing)

                    if (MathUtils.distance(b.x, b.y, e.x, e.y) < e.radius + 5) {
                        e.health -= b.damage;
                        spawnBlood(e.x, e.y, MathUtils.angle(b.x, b.y, e.x, e.y));
                        updateScore(10);
                        
                        if (e.health <= 0) {
                            triggerHitmarker(true);
                            enemies.splice(i, 1);
                            updateScore(100);
                            DOM.enemiesRemaining.textContent = `TARGETS: ${enemies.length}`;
                        } else {
                            triggerHitmarker(false);
                        }

                        if (!b.pierce) {
                            bullets.splice(j, 1);
                        } else {
                            b.hitEntities.add(e);
                        }
                        break; // bullet hit, move to next enemy
                    }
                }
            }

            // 6. Wave Management
            if (enemies.length === 0) {
                spawnWave();
            }

            // 7. Update Minimap (every 3 frames for perf)
            if(GameState.frame % 3 === 0) drawMinimap();

            // Loop
            requestAnimationFrame(gameLoop);
        }

        /**
         * GAME STATE CONTROLLERS
         */
        function initGame() {
            player = new Player();
            bullets = [];
            enemies = [];
            particles = [];
            
            GameState.score = 0;
            GameState.wave = 0;
            GameState.frame = 0;
            
            updateScore(0);
            player.updateHUD();
            spawnWave();
            
            DOM.mainMenu.classList.add('hidden');
            DOM.gameOver.classList.add('hidden');
            DOM.hud.classList.remove('hidden');
            
            GameState.isRunning = true;
            gameLoop();
        }

        function endGame() {
            GameState.isRunning = false;
            DOM.hud.classList.add('hidden');
            DOM.gameOver.classList.remove('hidden');
            DOM.finalScore.textContent = GameState.score;
            DOM.finalWave.textContent = GameState.wave;
        }

        // Event Bindings
        DOM.startBtn.addEventListener('click', initGame);
        DOM.restartBtn.addEventListener('click', initGame);

    </script>
</body>
</html>
