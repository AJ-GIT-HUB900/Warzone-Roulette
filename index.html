<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warzone Roulette</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>☢️ Warzone Roulette ☢️</h1>
        <p>Let the algorithm decide your fate.</p>
        
        <div class="results-card">
            <h2>Drop Location:</h2>
            <h3 id="drop-location">???</h3>
            
            <hr>
            
            <h2>Your Loadout:</h2>

            <p><strong>Secondary:</strong> <span id="secondary-weapon">???</span></p>
        </div>

        <button id="roll-btn">ROLL THE DICE</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
